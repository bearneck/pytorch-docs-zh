site_name: PyTorch 中文文档
site_description: PyTorch 官方文档中文翻译版，由 DeepSeek AI 自动翻译
site_author: PyTorch 中文社区
site_url: https://bearneck.github.io/pytorch-docs-zh/
docs_dir: docs
site_dir: site
repo_url: https://github.com/bearneck/pytorch-docs-zh
repo_name: pytorch-docs-zh
theme:
  name: material
  language: zh
  palette:
  - scheme: default
    primary: deep orange
    accent: orange
    toggle:
      icon: material/brightness-7
      name: 切换到暗色模式
  - scheme: slate
    primary: deep orange
    accent: orange
    toggle:
      icon: material/brightness-4
      name: 切换到亮色模式
  font:
    text: Noto Sans SC
    code: Roboto Mono
  features:
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.sections
  - navigation.expand
  - navigation.top
  - navigation.indexes
  - navigation.footer
  - navigation.path
  - search.suggest
  - search.highlight
  - search.share
  - content.code.copy
  - toc.follow
plugins:
- search
markdown_extensions:
- pymdownx.highlight
- pymdownx.superfences: {}
- pymdownx.inlinehilite
- admonition
- pymdownx.details
- attr_list
- md_in_html
- tables
- toc:
    permalink: true
    title: 本页目录
extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/bearneck/pytorch-docs-zh
  - icon: fontawesome/brands/python
    link: https://pytorch.org/docs/
